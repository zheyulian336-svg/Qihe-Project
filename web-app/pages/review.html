<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>合同审查 - 契合</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="page review-page">
    <nav class="top-nav">
      <a href="../index.html" class="nav-back" aria-label="返回">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#1C2A5C" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 5l-7 7 7 7"/>
        </svg>
      </a>
      <h1 class="nav-title">合同审查</h1>
      <div style="width:20px"></div>
    </nav>

    <div class="review-scroll">
      <section class="card upload-card" id="upload-section">
        <h2 class="card-title">上传合同</h2>
        <div class="upload-grid" id="upload-grid">
          <button class="upload-add-tile" id="upload-add-btn" type="button" aria-label="添加文件">
            <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="#5B7FDB" stroke-width="2" stroke-linecap="round">
              <path d="M12 5v14"/>
              <path d="M5 12h14"/>
            </svg>
          </button>
        </div>
        <input type="file" id="file-input" accept="image/*,.doc,.docx,.pdf" multiple hidden>
        <p class="upload-hint" id="upload-hint">支持上传合同图片（最多10张）、Word 或 PDF 文件</p>
      </section>

      <div class="error-banner" id="error-banner" hidden></div>

      <button class="primary-btn full-width" id="start-review-btn" type="button">开始审查</button>
      <p class="disclaimer">内容由AI生成，仅供参考</p>

      <section class="review-result" id="review-result" hidden></section>
    </div>
  </div>

  <script src="../js/state.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/interaction.js"></script>
</body>
</html>
